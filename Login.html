<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url("https://images.unsplash.com/photo-1503264116251-35a269479413?w=1600") no-repeat center center/cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
}

.login-form{
position:relative;
z-index:1;
width:350px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
padding:30px;
border-radius:15px;
text-align:center;
color:#fff;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.login-form h2{
margin-bottom:20px;
}

.input-box{
display:flex;
align-items:center;
background:rgba(255,255,255,.2);
margin:12px 0;
padding:12px;
border-radius:8px;
}

.input-box i{
margin-right:10px;
}

.input-box input{
width:100%;
border:none;
outline:none;
background:transparent;
color:white;
font-size:16px;
}

.input-box input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

p{
margin-top:15px;
}

a{
color:#00c6ff;
text-decoration:none;
}
 .loading-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#090b1d;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loading-logo{
    width:120px;
    height:120px;
    border-radius:50%;
    animation:spin 2s linear infinite;
}

.loading-screen h2{
    color:white;
    margin-top:20px;
    font-size:30px;
}

.loading-screen p{
    color:#8b5cf6;
    font-size:18px;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}   
</style>

</head>
<body>

<div class="overlay"></div>

<div class="login-form">

<h2>Login</h2>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="loginUser()">Login</button>

<p>Don't have an account?
<a href="Register.html">Register</a>
</p>

</div>
<div id="loadingScreen" class="loading-screen">
    <img src="1000297255.png" class="loading-logo">
    <h2>CHAPCY</h2>
    <p>Loading...</p>
</div>
<script type="module" src="firebase.js"></script>

</body>
</html>
