<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

  body{
    margin:0;
    padding:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("file_0000000005347246b81a1dcb123db1a2.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    font-family:Arial,sans-serif;
  }

    .register-form{
    width:400px;
    padding:35px;
    border-radius:20px;
    background:
        linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.70)),
        url("file_00000000a0f472468a27ccad77387676.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    border:2px solid #00d4ff;
    box-shadow:0 0 30px rgba(0,212,255,.5);
    backdrop-filter:blur(10px);
    }
    
    .input-box{
      display:flex;
      align-items:center;
      background:rgba(255,255,255,.2);
      margin:12px 0;
      padding:12px;
      border-radius:8px;
    }

    .input-box i{
      margin-right:10px;
    }

    .input-box input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:white;
      font-size:16px;
    }

    .input-box input::placeholder{
      color:#ddd;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#00c6ff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#0072ff;
    }
    .loading-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(180deg,#07081b,#090b20,#060718);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loading-logo{
    width:180px;
    height:180px;
    border-radius:50%;
    margin-bottom:25px;
    box-shadow:0 0 35px #8b5cf6;
}

.loading-screen h2{
    color:#fff;
    font-size:58px;
    font-weight:bold;
    letter-spacing:4px;
    margin-bottom:20px;
}

.loading-screen p{
    color:#8b5cf6;
    font-size:28px;
    font-family:'Poppins',sans-serif;
}

.loading-screen p::after{
    content:"";
    animation:dots 1.5s infinite;
}

@keyframes dots{
    0%{content:"";}
    25%{content:".";}
    50%{content:"..";}
    75%{content:"...";}
    100%{content:"....";}
}
    .login-link{
    margin-top:20px;
    color:#fff;
    font-size:15px;
    text-align:center;
}

.login-link a{
    color:#00c6ff;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.login-link a:hover{
    color:#8b5cf6;
    text-decoration:underline;
}

.login-link i{
    margin-right:5px;
}
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="register-form">

  <h2>Register</h2>

  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" id="name" placeholder="Full Name">
  </div>

  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
  </div>
  <button onclick="registerUser()">Register</button>

<p class="login-link">
    Already have an account?
    <a href="Login.html">
        <i class="fa-solid fa-right-to-bracket"></i> Login
    </a>
</p>

</div>

<div id="loadingScreen" class="loading-screen">
    <img src="file_000000004f547243bb0fa43d66db1edf.png" class="loading-logo" alt="CHAPCY Logo">
    <h2>CHAPCY</h2>
    <p>Loading...</p>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
