<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:url("https://images.unsplash.com/photo-1503264116251-35a269479413?w=1600") no-repeat center center/cover;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.6);
    }

    .register-form{
      position:relative;
      z-index:1;
      width:350px;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(12px);
      padding:30px;
      border-radius:15px;
      text-align:center;
      color:#fff;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    .register-form h2{
      margin-bottom:20px;
    }

    .input-box{
      display:flex;
      align-items:center;
      background:rgba(255,255,255,.2);
      margin:12px 0;
      padding:12px;
      border-radius:8px;
    }

    .input-box i{
      margin-right:10px;
    }

    .input-box input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:white;
      font-size:16px;
    }

    .input-box input::placeholder{
      color:#ddd;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#00c6ff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#0072ff;
    }
    .loading-screen{
    position:fixed;
    inset:0;
    background:linear-gradient(180deg,#07081b,#090b20,#060718);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loading-logo{
    width:180px;
    height:180px;
    border-radius:50%;
    margin-bottom:25px;
    box-shadow:0 0 35px #8b5cf6;
}

.loading-screen h2{
    color:#fff;
    font-size:58px;
    font-weight:bold;
    letter-spacing:4px;
    margin-bottom:20px;
}

.loading-screen p{
    color:#8b5cf6;
    font-size:28px;
    font-family:'Poppins',sans-serif;
}

.loading-screen p::after{
    content:"";
    animation:dots 1.5s infinite;
}

@keyframes dots{
    0%{content:"";}
    25%{content:".";}
    50%{content:"..";}
    75%{content:"...";}
    100%{content:"....";}
}
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="register-form">

  <h2>Register</h2>

  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" id="name" placeholder="Full Name">
  </div>

  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Password">
  </div>

<button onclick="registerUser()">Register</button>

</div>

<div id="loadingScreen" class="loading-screen">
    <img src="file_000000004f547243bb0fa43d66db1edf.png" class="loading-logo" alt="CHAPCY Logo">
    <h2>CHAPCY</h2>
    <p>Loading...</p>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
