<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAPCY</title>

<link rel="stylesheet" href="chapcy.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Background -->
    <img src="file_00000000272071f485bba23f009160b7.png" class="background" alt="Background">

<div class="container">

    <!-- Navbar -->
    <header class="header">

        <div class="logo">

            <img src="file_000000004f547243bb0fa43d66db1edf.png" alt="CHAPCY Logo">

            <div class="logo-text">
                <h2>CHAPCY</h2>
                <span>Global Live Chat</span>
            </div>

        </div>

        <nav>

            <a class="active" href="#">
                <i class="fa-solid fa-house"></i>
                Home
            </a>

            <a href="#">Groups</a>
            <a href="#">Community</a>
            <a href="#">Live Chat</a>
            <a href="#">CHAPCY TV</a>

        </nav>

        <div class="nav-right">

            <i class="fa-solid fa-magnifying-glass"></i>

        </div>

    </header>
    <!-- CHAPCY GROUP CARD -->

<section class="group-card">

    <div class="group-logo">
        <img src="file_000000004f547243bb0fa43d66db1edf.png" alt="CHAPCY">
    </div>

    <div class="group-info">

        <h2>CHAPCY Community</h2>

        <p>
            Join the official CHAPCY Global Community.
            Meet new friends, chat live, share ideas and enjoy amazing conversations with people around the world.
        </p>

        <div class="group-stats">

            <span>
                <i class="fa-solid fa-users"></i>
                50K+ Members
            </span>

            <span>
                <i class="fa-solid fa-circle" style="color:#27ff6f;"></i>
                2.8K Online
            </span>

        </div>

    </div>

    <div class="group-action">

        <a href="group.html" class="join-btn">

            <i class="fa-solid fa-comments"></i>

            Join Chat

        </a>

    </div>

</section>

</div>

<script src="chapcy.js"></script>

</body>
</html>
