<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAPCY</title>

<link rel="stylesheet" href="chapcy.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Background -->
    <img src="file_00000000272071f485bba23f009160b7.png" class="background" alt="Background">

<div class="container">

    <!-- Navbar -->
    <header class="header">

        <div class="logo">

            <img src="file_000000004f547243bb0fa43d66db1edf.png" alt="CHAPCY Logo">

            <div class="logo-text">
                <h2>CHAPCY</h2>
                <span>Global Live Chat</span>
            </div>

        </div>

        <nav>

            <a class="active" href="#">
                <i class="fa-solid fa-house"></i>
                Home
            </a>

            <a href="#">Groups</a>
            <a href="#">Community</a>
            <a href="#">Live Chat</a>
            <a href="#">CHAPCY TV</a>

        </nav>

        <div class="nav-right">

            <i class="fa-solid fa-magnifying-glass"></i>

        </div>

    </header>

    <!-- Hero -->

    <section class="hero">

        <!-- Left -->

        <div class="hero-left">

            <div class="tag">
                <i class="fa-solid fa-comments"></i>
                Join. Chat. Connect.
            </div>

            <h1>

                Global Community

                <span>Live Chat</span>

            </h1>

            <p>

                Connect with millions of people worldwide.
                Meet new friends, chat live,
                watch videos and discover amazing communities.

            </p>

            <div class="hero-buttons">

                <a href="#" class="btn1">
                    Enter Global Chat
                </a>

                <a href="#" class="btn2">
                    Download App
                </a>

            </div>

        </div>

        <!-- Right -->

        <div class="hero-right">

            <img src="images/file_00000000272071f485bba23f009160b7.png"
            alt="Hero">

        </div>

    </section>

</div>

<script src="chapcy.js"></script>

</body>
</html>
