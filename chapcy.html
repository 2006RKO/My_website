<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CHAPCY</title>

    <link rel="stylesheet" href="chapcy.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- =========================
            BACKGROUND
    ========================== -->

    <img
        src="file_00000000272071f485bba23f009160b7.png"
        class="background"
        alt="Background"
    >


    <!-- =========================
            CHAPCY LOGO
    ========================== -->

    <div class="logo">

        <img
            src="file_00000000dd9471f4a7cfe6138290e021.png"
            alt="CHAPCY Logo"
        >

    </div>

     <!-- USER PROFILE TOP RIGHT -->

<div class="user-profile">

    <button class="profile-btn" onclick="toggleProfile()">

        <i class="fa-solid fa-user"></i>

    </button>


    <div class="profile-menu" id="profileMenu">

        <div class="profile-header">

            <div class="profile-avatar">

                <i class="fa-solid fa-user"></i>

            </div>

            <div>

                <h3 id="userName">
                    User
                </h3>

                <p id="userEmail">
                    user@email.com
                </p>

            </div>

        </div>


        <hr>


        <a href="profile.html">

            <i class="fa-solid fa-user"></i>

            My Profile

        </a>


        <a href="settings.html">

            <i class="fa-solid fa-gear"></i>

            Settings

        </a>


        <button class="logout-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </div>

</div>


    <!-- =========================
            BUBBLE CONTAINER
    ========================== -->

    <div class="bubble"></div>


    <!-- =========================
            GLOBAL CHAT SECTION
    ========================== -->

    <section class="global-chat">

        <h1>
            Community Chat Room
        </h1>


        <!-- =========================
                CARD CONTAINER
        ========================== -->

        <div class="container">


            <!-- =========================
                    CHAPCY CARD
            ========================== -->

            <div class="chapcy-item">

                <img
                    src="file_000000002b8071f4b410ea7b9a3969d6.png"
                    alt="Community Chat Room"
                >


                <div class="card-content">

                    <h2>
                        🌍 Worldwide Live Chat
                    </h2>

                    <p>
                        Connect and chat with people from all around the world.
                    </p>


                    <button onclick="window.location.href='chat.html'">

                        <i class="fa-solid fa-comments"></i>

                        Join Chat

                    </button>

                </div>

            </div>


        </div>

    </section>


    <!-- =========================
            JAVASCRIPT
    ========================== -->

    <script src="chapcy.js"></script>

</body>

</html>
