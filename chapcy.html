<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAPCY</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Background -->
    <img src="images/file_00000000272071f485bba23f009160b7.png" alt="Background">
    <div class="layer-blur"></div>

    <!-- Container -->
    <div class="container">

        <!-- Header -->
        <header>
            <header class="header">

                  <div class="log">

            <img src="file_000000004f547243bb0fa43d66db1edf.png" alt="CHAPCY">
          <div>
                <h2>CHAPCY</h2>

                    <p>Global Live Chat</p>
          </div>
                  </div>
                
            <nav>

                <a href="#">Home</a>

                <a href="#">Features</a>

                <a href="#">Community</a>

                <a href="#">About</a>

                <a href="#">Contact</a>

            </nav>

            <button class="btn-chapcy">
                Download
            </button>

        </header>

        <!-- Hero Section -->
        <section class="hero">

            <div class="tag-box">

                <div class="tag">
                    Welcome to CHAPCY
                </div>

            </div>

            <h1>
                Global Community <br>
                For Chat
            </h1>

            <p class="description">
                Chat with friends, watch videos,
                join communities and connect with
                millions of people around the world.
            </p>

            <div class="buttons">

                <a href="#" class="btn-get">
                    Get Started
                </a>

                <a href="#" class="btn-learn">
                    Learn More
                </a>

            </div>

        </section>

    </div>

    <script src="slider.js"></script>

</body>
</html>
