<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAPCY Worldwide Live Chat</title>

<link rel="stylesheet" href="chapcy.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">

<img src="file_000000004f547243bb0fa43d66db1edf.png" alt="Logo">

<div>

<h1>CHAPCY</h1>

<p>Worldwide Live Chat</p>

</div>

</div>

</header>

<main class="chat-board">

<div class="chat-header">

<div class="room">

<img src="file_000000004f547243bb0fa43d66db1edf.png">

<div>

<h2>Global Chat Room</h2>

<p class="online">
🟢 <span id="onlineUsers">0</span> Users Online
</p>

</div>

</div>

</div>

<div id="chatBox" class="chat-box">

</div>

<div class="message-area">

<button class="tool-btn">😊</button>

<button class="tool-btn">📎</button>

<input
type="text"
id="messageInput"
placeholder="Type your message...">

<button class="tool-btn">🎤</button>

<button id="sendBtn">

<i class="fas fa-paper-plane"></i>

Send

</button>

</div>

</main>

<script src="chapcy.js"></script>

</body>

</html>
